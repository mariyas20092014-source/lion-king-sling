<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>mgmp</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      width:100%;height:100%;
      font-family:"Roboto Condensed",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:#f5f5f5;
      overflow:hidden;
      background:#000;
    }
    body{
      width:100vw;height:100vh;
      display:flex;align-items:center;justify-content:center;
    }
    #game-root{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }
    #game-canvas{
      position:absolute;inset:0;width:100%;height:100%;display:block;
      z-index:0;
    }
    .screen{position:absolute;inset:0;
      display:none;align-items:center;justify-content:center;
      padding:20px;z-index:10;}
    .screen.active{display:flex;}
    #start-screen{
      background:url("images/bg1.png") center center / cover no-repeat;
    }
    #select-screen{background:transparent;}
    .card{
      background:rgba(205, 188, 235,0.88);
      border-radius:24px;
      box-shadow:0 24px 60px rgba(0,0,0,0.65);
      padding:24px 20px;
      max-width:420px;
      width:90%;
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.06);
      color:#000000;
      text-align:center;
    }
    #select-screen .card{max-width:640px;}
    h1,h2{font-weight:700;letter-spacing:0.03em;}
    h1{font-size:36px;margin-bottom:10px;}
    h2{font-size:30px;margin-bottom:8px;}
    p{line-height:1.4;margin-bottom:10px;font-size:16px;}
    .subtitle{opacity:0.85;font-size:15px;margin-bottom:16px;}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      border-radius:999px;border:none;
      padding:11px 24px;font-size:15px;font-weight:600;
      letter-spacing:0.07em;text-transform:uppercase;
      cursor:pointer;
      background:linear-gradient(135deg,#5f4d85,#bea9e8);
      color:#efe8fc;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
      transition:transform 0.16s,box-shadow 0.16s,filter 0.16s;
      margin-top:16px;
      font-family:"Roboto Condensed",sans-serif;
    }
    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 16px 35px rgba(0,0,0,0.5);
      filter:brightness(1.05);
    }
    .btn:active{
      transform:translateY(1px) scale(0.98);
      box-shadow:0 6px 15px rgba(0,0,0,0.6);
      filter:brightness(0.95);
    }
    .btn-secondary{
      background:transparent;color:#fff;
      border:1px solid rgba(255,255,255,0.25);
      box-shadow:none;
    }
    .select-buttons{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:18px;
    }
    .character-select{
      display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;justify-content:center;
    }
    .char-card{
      flex:1 1 140px;border-radius:18px;
      border:1px solid rgba(255,255,255,0.12);
      background:radial-gradient(circle at top left,rgba(255,255,255,0.08),rgba(0,0,0,0.85));
      padding:10px;text-align:center;cursor:pointer;
      transition:transform 0.16s,box-shadow 0.16s,border-color 0.16s;
    }
    .char-card img{
      max-width:110px;max-height:110px;object-fit:contain;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,0.8));
    }
    .char-card:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(0,0,0,0.7);}
    .char-card.selected{border-color:#a5cc72;box-shadow:0 18px 40px rgba(255,179,71,0.35);}
    .char-name{font-size:14px;margin-top:6px;}
    .char-tag{font-size:12px;opacity:0.75;}
    .hud{
      position:absolute;top:6px;left:50%;transform:translateX(-50%);
      padding:10px 24px;border-radius:999px;
      display:flex;align-items:center;gap:18px;
      background:rgba(0,0,0,0.7);color:#fff;font-size:20px;
      backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.18);
      z-index:3;
    }
    .hud span.label{opacity:0.8;}
    #question-bar{
      position:absolute;
      left:50%;transform:translateX(-50%);
      top:60px;
      width:40vw;
      max-width:520px;
      min-height:70px;
      padding:12px 20px;
      background:rgba(7,7,20,0.96);
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.14);
      box-shadow:0 14px 30px rgba(0,0,0,0.55);
      color:#fff;
      display:none;
      z-index:3;
    }
    #q-main-text{
      width:100%;
      text-align:center;
      font-size:20px;
      font-weight:600;
      margin-bottom:8px;
    }
    #q-options{
      display:flex;flex-wrap:wrap;gap:10px;
      justify-content:center;
      margin-top:4px;
    }
    .q-option{
      font-size:18px;
      padding:10px 22px;
      border-radius:999px;
      border:1px solid #ffb347;
      background:#d2c5eb;
      color:#504566;
      cursor:pointer;
      transition:background 0.14s,transform 0.12s,box-shadow 0.14s;
      font-family:"Roboto Condensed",sans-serif;
    }
    .q-option:hover{
      background:#7e68a8;
      box-shadow:0 4px 8px rgba(0,0,0,0.25);
      transform:translateY(-1px);
    }
    .q-option.selected{
      background:#adc48d;
      box-shadow:0 4px 10px rgba(0,0,0,0.35);
    }
    #q-feedback{
      margin-top:4px;font-size:13px;min-height:1em;text-align:center;
    }
    #q-actions{
      margin-top:6px;display:flex;justify-content:flex-end;
    }
    #btn-q-confirm{
      border-radius:999px;border:none;padding:6px 18px;font-size:13px;
      letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;
      background:linear-gradient(135deg,#ffb347,#ff6b6b);color:#111;
      box-shadow:0 6px 18px rgba(0,0,0,0.5);
      transition:transform 0.14s,box-shadow 0.14s;
      font-family:"Roboto Condensed",sans-serif;
    }
    .firework{
      position:absolute;width:4px;height:4px;border-radius:50%;
      background:#fffb;
      box-shadow:0 0 6px #fff,0 0 12px #ffb347,0 0 18px #ff6b6b;
      animation:boom 1s ease-out forwards;
    }
    @keyframes boom{
      0%{transform:translate(0,0) scale(1);opacity:1;}
      100%{transform:translate(var(--tx),var(--ty)) scale(0.2);opacity:0;}
    }
    @media (max-width:768px){
      .card{padding:18px 16px;border-radius:20px;}
      h1{font-size:30px;}h2{font-size:24px;}
      #question-bar{
        top:56px;
        width:calc(100vw - 40px);
        max-width:none;
        padding:10px 12px;
      }
      .hud{top:4px;padding:8px 16px;font-size:18px;}
      #q-main-text{font-size:18px;}
    }
  </style>
</head>
<body>
<div id="game-root">
  <canvas id="game-canvas"></canvas>
  <div id="start-screen" class="screen active">
    <div class="card">
      <h1>Prepositions of time</h1>
      <p class="subtitle">
        Pull the character, choose the correct answer and attack!
      </p>
      <button id="btn-start" class="btn">Начать</button>
    </div>
  </div>
  <div id="select-screen" class="screen">
    <div class="card">
      <h2>Выбери персонажа</h2>
      <div class="character-select">
        <div class="char-card" data-pig="1">
          <img src="images/pig1.png" alt="">
          <div class="char-name">Классика</div>
          <div class="char-tag">Red</div>
        </div>
        <div class="char-card" data-pig="2">
          <img src="images/pig2.png" alt="">
          <div class="char-name">сердитый</div>
          <div class="char-tag">Жёлтый</div>
        </div>
        <div class="char-card" data-pig="3">
          <img src="images/pig3.png" alt="">
          <div class="char-name">Smart</div>
          <div class="char-tag">Stella</div>
        </div>
      </div>
      <div class="select-buttons">
        <button id="btn-play" class="btn">играть</button>
        <button id="btn-back-start" class="btn btn-secondary">назад</button>
      </div>
    </div>
  </div>
  <div id="hud" class="hud" style="display:none;">
    <div><span class="label">Вопрос:</span> <strong id="hud-qindex">1 / 10</strong></div>
    <div><span class="label">Верные:</span> <strong id="hud-correct">0</strong></div>
    <div><span class="label">Ошибки:</span> <strong id="hud-errors">0 / 3</strong></div>
  </div>
  <div id="question-bar">
    <div id="q-main-text"></div>
    <div id="q-options"></div>
    <div id="q-feedback"></div>
    <div id="q-actions">
      <button id="btn-q-confirm">Готово</button>
    </div>
  </div>
  <div id="end-screen" class="screen">
    <div class="card">
      <h2>Результат</h2>
      <p style="font-size:15px;margin-bottom:8px;">
        Верных ответов: <b><span id="final-correct">0</span> / <span id="final-total">0</span></b>
      </p>
      <p style="font-size:15px;margin-bottom:12px;">
        Ошибки: <b><span id="final-errors">0</span></b>
      </p>
      <button id="btn-play-again" class="btn">Играть снова?</button>
    </div>
  </div>
  <div id="gameover-screen" class="screen">
    <div class="card">
      <h2>Game Over</h2>
      <p class="subtitle">You've made 3 mistakes</p>
      <button id="btn-try-again" class="btn">Play again</button>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');

  const startScreen = document.getElementById('start-screen');
  const selectScreen = document.getElementById('select-screen');
  const endScreen = document.getElementById('end-screen');
  const gameOverScreen = document.getElementById('gameover-screen');
  const btnStart = document.getElementById('btn-start');
  const btnBackStart = document.getElementById('btn-back-start');
  const btnPlay = document.getElementById('btn-play');
  const btnPlayAgain = document.getElementById('btn-play-again');
  const btnTryAgain = document.getElementById('btn-try-again');

  const hud = document.getElementById('hud');
  const hudQIndex = document.getElementById('hud-qindex');
  const hudErrors = document.getElementById('hud-errors');
  const hudCorrect = document.getElementById('hud-correct');

  const qBar = document.getElementById('question-bar');
  const qMainText = document.getElementById('q-main-text');
  const qOptions = document.getElementById('q-options');
  const qFeedback = document.getElementById('q-feedback');
  const btnQConfirm = document.getElementById('btn-q-confirm');

  const finalCorrect = document.getElementById('final-correct');
  const finalTotal = document.getElementById('final-total');
  const finalErrors = document.getElementById('final-errors');

  const charCards = Array.from(document.querySelectorAll('.char-card'));
  let selectedPig = 1;
  charCards.forEach(card=>{
    card.addEventListener('click',()=>{
      charCards.forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      selectedPig = Number(card.dataset.pig);
    });
  });
  charCards[0].classList.add('selected');

  function showScreen(scr){
    [startScreen,selectScreen,endScreen,gameOverScreen].forEach(s=>s.classList.remove('active'));
    if(scr) scr.classList.add('active');
  }

  btnStart.onclick = () => showScreen(selectScreen);
  btnBackStart.onclick = () => showScreen(startScreen);
  btnPlay.onclick = startGame;

  function resetToStart(){
    hud.style.display = 'none';
    qBar.style.display = 'none';
    showScreen(startScreen);
    state = null;
  }

  btnPlayAgain.onclick = resetToStart;
  btnTryAgain.onclick = resetToStart;

  const bg = new Image();
  bg.src = 'images/main.png';

  const pigImgs = {1:new Image(),2:new Image(),3:new Image()};
  pigImgs[1].src='images/pig1.png';
  pigImgs[2].src='images/pig2.png';
  pigImgs[3].src='images/pig3.png';

  const buildingImg = new Image();
  buildingImg.src='images/building.png';
  const pigNearImg = new Image();
  pigNearImg.src='images/ch1.png';
  const pigOnImg = new Image();
  pigOnImg.src='images/ch2.png';

  const baseQuestions = [
    { text:"I ____ (brush) my teeth in the morning.", options:["brushes","brush","brushing"], answer:"brush" },
    { text:"Alex ____ (get up) at 7 o'clock every day.", options:["gets up","get up","get ups"], answer:"gets up" },
    { text:"Children ____ (come) home after school.", options:["comes","come","coming"], answer:"come" },
    { text:"They _____ (have) dinner together on Fridays.", options:["have","has","having"], answer:"have" },
    { text:"She ____ (go) shopping on Sundays.", options:["goes","go","going"], answer:"goes" },
    { text:"My friend ____ (play) in the garden in summer.", options:["play","plays","playing"], answer:"plays" },
    { text:"Olya ____ (have) English classes on Monday.", options:["having","have","has"], answer:"has" },
    { text:"Alex ____ (walk) her dog at 7 o’clock.", options:["walking","walk","walks"], answer:"walks" },
    { text:"Olya and Alex ____ (get dressed) in the morning.", options:["get dressed","gets dressed","getting dressed"], answer:"get dressed" },
    { text:"He ____ (have) a good time with his grandpa.", options:["has","have","having"], answer:"has" }
  ];

  const GRAVITY = 1200;
  const PIG_RADIUS = 26 * 2.5;
  const SLING_X_FRAC = 0.18;

  let state = null;
  let readyForNext = false;

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function resetState(){
    const now = performance.now();
    state = {
      w:canvas.clientWidth,
      h:canvas.clientHeight,
      last:now,
      pig:{x:0,y:0,vx:0,vy:0,drag:false,fly:false,img:pigImgs[selectedPig]},
      sling:{x:0,y:0},
      groundY:0,
      building:[],
      sidePigs:[],
      topCharIndex:1,
      fragments:[],
      wiggleTime:0,
      glowBlock:null,
      glowTimer:0,
      qIndex:0,
      selected:null,
      correct:0,
      errors:0,
      waitingAnswer:false,
      questionLocked:false,
      shot:false,
      pullVector:{x:0,y:0},
      hitRegistered:false,
      currentShotIsHit:false,
      questions:shuffle(baseQuestions)
    };
    readyForNext = false;
  }

  function resize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width*dpr;
    canvas.height = rect.height*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    if(!state) return;
    state.w = rect.width;
    state.h = rect.height;
    layoutWorld();
  }
  window.addEventListener('resize',resize);

  function layoutWorld(){
    const w=state.w,h=state.h;
    state.groundY = h*0.94;
    state.sling.x = w*SLING_X_FRAC;
    state.sling.y = state.groundY - PIG_RADIUS - 10;
    resetPig();
    const cols=2,rows=5;
    const towerWidth = w*0.16;
    const blockSize  = towerWidth / cols;
    const verticalOverlap = blockSize*0.15;
    const structX = w*0.7;
    const bottomRowY = state.groundY - blockSize;
    state.building=[];
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const y = bottomRowY - r*(blockSize-verticalOverlap);
        state.building.push({
          x:structX+c*blockSize,
          y:y,
          w:blockSize,h:blockSize,
          alive:true,
          order:r
        });
      }
    }
    const sideSize = 80*1.5;
    const nearPig = {
      img:pigNearImg,
      x:structX - sideSize*1.1,
      y:state.groundY - sideSize,
      w:sideSize,h:sideSize
    };
    const rightCol = state.building.filter(b=>b.x===structX+blockSize);
    const topBlock = rightCol.sort((a,b)=>b.order-a.order)[0];
    const onPig = {
      img:pigOnImg,
      w:sideSize,h:sideSize
    };
    if(topBlock){
      onPig.x = topBlock.x + (topBlock.w - onPig.w)/2;
      onPig.y = topBlock.y - onPig.h*0.9;
    }else{
      onPig.x = structX+blockSize;
      onPig.y = bottomRowY - onPig.h;
    }
    state.sidePigs=[nearPig,onPig];
  }

  function resetPig(){
    state.pig.x = state.sling.x;
    state.pig.y = state.sling.y;
    state.pig.vx=0;
    state.pig.vy=0;
    state.pig.fly=false;
    state.pig.drag=false;
    state.shot=false;
    state.hitRegistered=false;
    state.currentShotIsHit=false;
    readyForNext=false;
  }

  function startGame(){
    showScreen(null);
    hud.style.display='flex';
    resetState();
    state.pig.img = pigImgs[selectedPig];
    resize();
    state.last = performance.now();
    setupQuestion();
  }

  function updateHUD(){
    hudQIndex.textContent=(state.qIndex+1)+' / '+state.questions.length;
    hudErrors.textContent=state.errors+' / 3';
    hudCorrect.textContent=state.correct;
  }

  function clearQuestionUI(){
    qMainText.textContent = '';
    qOptions.innerHTML = '';
    qFeedback.textContent = '';
  }

  function setupQuestion(){
    const q = state.questions[state.qIndex];
    clearQuestionUI();
    qMainText.textContent = q.text;
    qFeedback.className = '';
    state.selected = null;
    state.waitingAnswer = false;
    state.questionLocked = false;
    state.fragments = [];
    state.pullVector = {x:0,y:0};
    state.wiggleTime = 0;
    state.glowBlock = null;
    state.glowTimer = 0;
    resetPig();
    updateHUD();
    q.options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='q-option';
      btn.textContent=opt;
      btn.onclick=()=>{
        if(state.questionLocked) return;
        Array.from(qOptions.children).forEach(c=>c.classList.remove('selected'));
        btn.classList.add('selected');
        state.selected=opt;
        qFeedback.textContent='';
      };
      qOptions.appendChild(btn);
    });
  }

  btnQConfirm.onclick = () => {
    if(!state) return;
    if(!state.waitingAnswer) return;
    if(state.questionLocked) return;
    if(!state.selected){
      qFeedback.textContent='Сначала выберите верный ответ';
      qFeedback.className='';
      return;
    }
    const q=state.questions[state.qIndex];
    const correct = state.selected.toLowerCase()===q.answer.toLowerCase();
    state.waitingAnswer=false;
    state.questionLocked=true;
    qBar.style.display='none';
    state.currentShotIsHit = !!correct;
    if(correct){
      state.correct++;
      shootHit();
    }else{
      state.errors++;
      shootMiss();
    }
    updateHUD();
  };

  function nextQuestion(){
    if(state.errors>=3){
      finish(false);
      return;
    }
    state.qIndex++;
    if(state.qIndex>=state.questions.length){
      finish(true);
      return;
    }
    setupQuestion();
  }

  function finish(win){
    hud.style.display='none';
    qBar.style.display='none';
    finalCorrect.textContent=state.correct;
    finalTotal.textContent=state.questions.length;
    finalErrors.textContent=state.errors;
    if(win){
      showScreen(endScreen);
      fireworks();
    }else{
      showScreen(gameOverScreen);
    }
  }

  function fireworks(){
    const root=document.getElementById('game-root');
    for(let i=0;i<18;i++){
      const d=document.createElement('div');
      d.className='firework';
      const x=Math.random()*window.innerWidth;
      const y=Math.random()*(window.innerHeight*0.4)+40;
      const ang=Math.random()*Math.PI*2;
      const dist=80+Math.random()*120;
      d.style.left=x+'px';
      d.style.top=y+'px';
      d.style.setProperty('--tx',Math.cos(ang)*dist+'px');
      d.style.setProperty('--ty',Math.sin(ang)*dist+'px');
      root.appendChild(d);
      setTimeout(()=>root.removeChild(d),1000);
    }
  }

  function shootHit(){
    const startX = state.sling.x + state.pullVector.x;
    const startY = state.sling.y + state.pullVector.y;
    state.pig.x = startX;
    state.pig.y = startY;
    const vx0 = state.sling.x - startX;
    const vy0 = state.sling.y - startY;
    const angle = Math.atan2(vy0, vx0);
    const target = findBlockAlongAngle(startX,startY,angle);
    if(target){
      const t = 0.9;
      const dx = (target.x+target.w/2) - startX;
      const dy = (target.y+target.h/2) - startY;
      state.pig.vx = dx/t;
      state.pig.vy = dy/t - 0.5*GRAVITY*t;
    }else{
      const strength=6;
      state.pig.vx = vx0*strength;
      state.pig.vy = vy0*strength;
    }
    state.pig.fly=true;
    state.shot=true;
    state.hitRegistered=false;
    readyForNext=false;
  }

  function shootMiss(){
    const startX = state.sling.x + state.pullVector.x;
    const startY = state.sling.y + state.pullVector.y;
    const strength = 6;
    state.pig.x = startX;
    state.pig.y = startY;
    state.pig.vx = (state.sling.x - startX)*strength;
    state.pig.vy = (state.sling.y - startY)*strength;
    state.pig.fly=true;
    state.shot=true;
    state.hitRegistered=false;
    readyForNext=false;
  }

  function findBlockAlongAngle(x,y,angle){
    const dirX = Math.cos(angle);
    const dirY = Math.sin(angle);
    let best=null, bestDist=Infinity;
    state.building.forEach(b=>{
      if(!b.alive) return;
      const cx = b.x + b.w/2;
      const cy = b.y + b.h/2;
      const vx = cx - x;
      const vy = cy - y;
      const proj = vx*dirX + vy*dirY;
      if(proj<=0) return;
      const perpX = vx - proj*dirX;
      const perpY = vy - proj*dirY;
      const perpDist = Math.hypot(perpX,perpY);
      if(perpDist < b.w*0.8 && proj<bestDist){
        bestDist = proj;
        best = b;
      }
    });
    return best;
  }

  function screenPos(e){
    const rect=canvas.getBoundingClientRect();
    const t=e.touches&&e.touches[0]||e;
    return {x:t.clientX-rect.left,y:t.clientY-rect.top};
  }

  function down(e){
    if(!state) return;
    if(state.shot || state.pig.fly || state.waitingAnswer) return;
    const p=screenPos(e);
    const dx=p.x-state.pig.x,dy=p.y-state.pig.y;
    if(Math.hypot(dx,dy)<=PIG_RADIUS*1.8){
      state.pig.drag=true;
    }
  }

  function move(e){
    if(!state || !state.pig.drag) return;
    e.preventDefault();
    const p=screenPos(e);
    const slx=state.sling.x,sly=state.sling.y;
    let dx=p.x-slx,dy=p.y-sly;
    const maxPull=state.w*0.18;
    const d=Math.hypot(dx,dy);
    if(d>maxPull){dx*=maxPull/d;dy*=maxPull/d;}
    state.pig.x=slx+dx;
    state.pig.y=sly+dy;
    state.pullVector={x:dx,y:dy};
  }

  function up(){
    if(!state || !state.pig.drag) return;
    state.pig.drag=false;
    const slx=state.sling.x,sly=state.sling.y;
    const dx=state.pig.x-slx,dy=state.pig.y-sly;
    const d=Math.hypot(dx,dy);
    const MIN_PULL=state.w*0.02;
    if(d<MIN_PULL){
      resetPig();
      return;
    }
    state.waitingAnswer=true;
    qBar.style.display='block';
  }

  canvas.addEventListener('mousedown',down);
  canvas.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);

  canvas.addEventListener('touchstart',down,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('touchend',up);

  function loop(t){
    if(!state){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawStaticBg();
      requestAnimationFrame(loop);
      return;
    }
    const dt=(t-state.last)/1000;
    state.last=t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function drawStaticBg(){
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const dpr = window.devicePixelRatio || 1;
    if(canvas.width !== w*dpr || canvas.height !== h*dpr){
      canvas.width = w*dpr;
      canvas.height = h*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    if(bg.complete && bg.naturalWidth){
      const imgRatio=bg.width/bg.height;
      const screenRatio=w/h;
      let dw,dh,dx,dy;
      if(screenRatio>imgRatio){
        dw=w;dh=w/imgRatio;dx=0;dy=(h-dh)/2;
      }else{
        dh=h;dw=h*imgRatio;dy=0;dx=(w-dw)/2;
      }
      ctx.drawImage(bg,dx,dy,dw,dh);
    }
  }

  function update(dt){
    const g=GRAVITY*dt;
    const h=state.h;
    const groundY=state.groundY;
    if(state.wiggleTime>0){
      state.wiggleTime -= dt;
      if(state.wiggleTime<0) state.wiggleTime=0;
    }
    if(state.glowTimer>0){
      state.glowTimer -= dt;
      if(state.glowTimer<=0){
        state.glowTimer=0;
        state.glowBlock=null;
      }
    }
    if(state.pig.fly){
      state.pig.vy+=g;
      state.pig.x+=state.pig.vx*dt;
      state.pig.y+=state.pig.vy*dt;
      if(state.currentShotIsHit && !state.hitRegistered){
        const hitBlock = state.building.find(b=>{
          if(!b.alive) return false;
          return circleRect(state.pig.x,state.pig.y,PIG_RADIUS,b.x,b.y,b.w,b.h);
        });
        if(hitBlock){
          state.hitRegistered = true;
          hitBlock.alive=false;
          spawnFragmentsHorizontal(hitBlock);
          state.wiggleTime = 0.3;
          state.glowBlock = {x:hitBlock.x,y:hitBlock.y,w:hitBlock.w,h:hitBlock.h};
          state.glowTimer = 0.35;
          collapseColumn(hitBlock);
          moveTopCharacterIfNeeded(hitBlock);
        }
      }
      if(
        state.pig.y>h+150 ||
        state.pig.x>state.w+200 ||
        state.pig.x<-200
      ){
        state.pig.fly=false;
        state.shot=false;
        resetPig();
        state.pullVector={x:0,y:0};
        readyForNext=true;
      }
    }
    state.fragments.forEach(f=>{
      f.vy+=g;
      f.x+=f.vx*dt;
      f.y+=f.vy*dt;
      if(f.y+f.h>groundY){
        f.y=groundY-f.h;
        f.vy*=-0.2;
        f.vx*=0.4;
        if(Math.abs(f.vy)<20) f.dead=true;
      }
    });
    state.fragments = state.fragments.filter(f=>!f.dead);
    if(
      readyForNext &&
      !state.pig.fly &&
      !state.shot &&
      state.fragments.length===0 &&
      state.questionLocked &&
      !state.waitingAnswer
    ){
      readyForNext=false;
      nextQuestion();
    }
  }

  function collapseColumn(hitBlock){
    const cx = hitBlock.x + hitBlock.w/2;
    const col = state.building.filter(b=>{
      const center = b.x + b.w/2;
      return Math.abs(center - cx) < hitBlock.w*0.4;
    });
    const alive = col.filter(b=>b.alive).sort((a,b)=>a.order-b.order);
    if(!alive.length) return;
    const groundY = state.groundY;
    const step = hitBlock.h - hitBlock.h*0.15;
    let currentY = groundY - hitBlock.h;
    alive.forEach(b=>{
      b.y = currentY;
      currentY -= step;
    });
  }

  function moveTopCharacterIfNeeded(hitBlock){
    const top = state.sidePigs[state.topCharIndex];
    if(!top) return;
    const centerTopX = top.x + top.w/2;
    const blockCenterX = hitBlock.x + hitBlock.w/2;
    if(Math.abs(centerTopX - blockCenterX) > hitBlock.w*0.4) return;
    const colBlocks = state.building.filter(b=>{
      const cx = b.x + b.w/2;
      return Math.abs(cx - blockCenterX) < hitBlock.w*0.4 && b.alive;
    });
    if(colBlocks.length){
      const topBlock = colBlocks.sort((a,b)=>b.order-a.order)[0];
      top.y = topBlock.y - top.h*0.9;
      top.x = topBlock.x + (topBlock.w - top.w)/2;
    }else{
      top.y = state.groundY - top.h;
      top.x = blockCenterX - top.w/2;
    }
  }

  function spawnFragmentsHorizontal(block){
    const halfH = block.h/2;
    const fragW = block.w;
    state.fragments.push({
      x:block.x,
      y:block.y,
      w:fragW,
      h:halfH,
      vx:-80,vy:-250,dead:false,
      sx:0, sy:0,
      sw:buildingImg.width,
      sh:buildingImg.height/2
    });
    state.fragments.push({
      x:block.x,
      y:block.y+halfH,
      w:fragW,
      h:halfH,
      vx:80,vy:-200,dead:false,
      sx:0, sy:buildingImg.height/2,
      sw:buildingImg.width,
      sh:buildingImg.height/2
    });
  }

  function circleRect(cx,cy,r,rx,ry,rw,rh){
    const closestX=Math.max(rx,Math.min(cx,rx+rw));
    const closestY=Math.max(ry,Math.min(cy,ry+rh));
    const dx=cx-closestX,dy=cy-closestY;
    return dx*dx+dy*dy<r*r;
  }

  function draw(){
    const w=state.w,h=state.h;
    ctx.clearRect(0,0,w,h);
    if(bg.complete&&bg.naturalWidth){
      const imgRatio=bg.width/bg.height;
      const screenRatio=w/h;
      let dw,dh,dx,dy;
      if(screenRatio>imgRatio){
        dw=w;dh=w/imgRatio;dx=0;dy=(h-dh)/2;
      }else{
        dh=h;dw=h*imgRatio;dy=0;dx=(w-dw)/2;
      }
      ctx.drawImage(bg,dx,dy,dw,dh);
    }
    const wiggleOffset = state.wiggleTime>0 ? Math.sin(Date.now()/40)*2 : 0;
    state.building.forEach(b=>{
      if(!b.alive) return;
      const drawX = b.x + wiggleOffset;
      const drawY = b.y;
      const isGlow = state.glowBlock &&
                     Math.abs(state.glowBlock.x - b.x) < 0.5 &&
                     Math.abs(state.glowBlock.y - b.y) < 0.5 &&
                     state.glowTimer>0;
      if(buildingImg.complete&&buildingImg.naturalWidth){
        if(isGlow){
          ctx.save();
          ctx.shadowColor='rgba(255,215,120,1)';
          ctx.shadowBlur=55;
          ctx.drawImage(buildingImg,drawX,drawY,b.w,b.h);
          ctx.restore();
        }else{
          ctx.drawImage(buildingImg,drawX,drawY,b.w,b.h);
        }
      }else{
        ctx.fillStyle=isGlow?'#ffd776':'#888';
        ctx.fillRect(drawX,drawY,b.w,b.h);
      }
    });
    ctx.save();
    ctx.globalAlpha=0.95;
    state.fragments.forEach(f=>{
      if(buildingImg.complete&&buildingImg.naturalWidth){
        ctx.drawImage(
          buildingImg,
          f.sx, f.sy, f.sw, f.sh,
          f.x, f.y, f.w, f.h
        );
      }else{
        ctx.fillStyle='#bbb';ctx.fillRect(f.x,f.y,f.w,f.h);
      }
    });
    ctx.restore();
    state.sidePigs.forEach(sp=>{
      if(!sp.img.complete||!sp.img.naturalWidth) return;
      ctx.drawImage(sp.img,sp.x,sp.y,sp.w,sp.h);
    });
    const baseWidth = 30;
    const trunkHeight = 70;
    const forkSpread = 24;
    const baseX = state.sling.x;
    const forkY = state.sling.y;
    const trunkTop = forkY;
    const trunkBottom = trunkTop + trunkHeight;
    ctx.fillStyle='#5b3414';
    ctx.fillRect(baseX-baseWidth/2, trunkTop, baseWidth, trunkHeight);
    ctx.fillRect(baseX-baseWidth/2-8, trunkBottom, baseWidth+16, 15);
    ctx.beginPath();
    ctx.moveTo(baseX, forkY-10);
    ctx.lineTo(baseX-forkSpread, forkY);
    ctx.lineTo(baseX+forkSpread, forkY);
    ctx.closePath();
    ctx.fill();
    if(!state.pig.fly){
      ctx.strokeStyle='#3b2410';
      ctx.lineWidth=4;
      const baseLeftX=baseX-forkSpread+2;
      const baseRightX=baseX+forkSpread-2;
      const baseY=forkY;
      const pigX=state.pig.x;
      const pigY=state.pig.y;
      ctx.beginPath();
      ctx.moveTo(baseLeftX,baseY);
      ctx.lineTo(pigX-8,pigY);
      ctx.moveTo(baseRightX,baseY);
      ctx.lineTo(pigX+8,pigY);
      ctx.stroke();
    }
    const img=state.pig.img;
    const r=PIG_RADIUS;
    if(img.complete&&img.naturalWidth){
      const iw=r*2.2,ih=r*2.2;
      ctx.drawImage(img,state.pig.x-iw/2,state.pig.y-ih/2,iw,ih);
    }else{
      ctx.fillStyle='#8bc34a';
      ctx.beginPath();ctx.arc(state.pig.x,state.pig.y,r,0,Math.PI*2);ctx.fill();
    }
  }
  resize();
  bg.onload=()=>drawStaticBg();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
